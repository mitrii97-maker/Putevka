<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0f14">
    <title>БелАЗ | Смена</title>
    <link rel="apple-touch-icon" sizes="180x180" href="https://img.icons8.com/fluency/180/truck.png">

<style>
:root {
    --bg: #080b10;
    --panel: rgba(18, 23, 31, 0.74);
    --panel-strong: rgba(19, 25, 35, 0.88);
    --line: rgba(255, 255, 255, 0.12);
    --muted: rgba(255, 255, 255, 0.64);
    --text: #f8fafc;
    --orange: #ffb340;
    --blue: #38bdf8;
    --green: #34d399;
    --red: #fb7185;
    --violet: #c084fc;
    --shadow: 0 18px 55px rgba(0, 0, 0, 0.38);
    --page-x: 14px;
    --safe-top: max(18px, env(safe-area-inset-top));
    --safe-bottom: max(18px, env(safe-area-inset-bottom));
    --card-h: 86px;
    --card-title: 28px;
    --card-trips: 42px;
    --card-gap: 8px;
    --button-size: 54px;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    height: 100%;
    min-height: 100%;
    background: var(--bg);
    overflow: hidden;
}

body {
    margin: 0;
    height: 100vh;
    height: 100dvh;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    background:
        linear-gradient(145deg, rgba(8, 11, 16, 0.40), rgba(8, 11, 16, 0.88)),
        radial-gradient(circle at 15% 5%, rgba(56, 189, 248, 0.24), transparent 32rem),
        radial-gradient(circle at 90% 10%, rgba(52, 211, 153, 0.16), transparent 30rem),
        linear-gradient(180deg, rgba(12, 17, 25, 0.30), rgba(8, 11, 16, 0.95)),
        url("bag.WEBP") center / cover fixed no-repeat;
    padding: var(--safe-top) 0 calc(92px + var(--safe-bottom));
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-text-size-adjust: 100%;
}

button,
input {
    font: inherit;
    user-select: text;
    -webkit-user-select: text;
}

button {
    cursor: pointer;
}

.shell {
    width: min(430px, 100%);
    height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 92px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

.topbar {
    flex: none;
    padding: 0 var(--page-x) 9px;
}

.brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
}

.brand-title {
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.brand-title strong {
    font-size: clamp(30px, 8vw, 40px);
    line-height: 0.95;
    letter-spacing: 0;
}

.brand-title span {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
}

.status-chip {
    min-width: 92px;
    padding: 9px 11px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--green);
    font-size: 13px;
    font-weight: 800;
    text-align: center;
    box-shadow: inset 0 1px rgba(255, 255, 255, 0.10);
}

.glass {
    border: 1px solid var(--line);
    background: var(--panel);
    -webkit-backdrop-filter: blur(18px) saturate(1.25);
    backdrop-filter: blur(18px) saturate(1.25);
    box-shadow: var(--shadow);
}

.dashboard {
    flex: none;
    margin: 0 var(--page-x) 10px;
    border-radius: 20px;
    overflow: hidden;
}

.plan-row {
    display: grid;
    grid-template-columns: 1fr minmax(120px, 42%);
    gap: 14px;
    align-items: center;
    padding: 13px 14px;
}

.label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
}

.plan-value {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.plan-value span:last-child {
    font-size: 18px;
    font-weight: 800;
}

.plan-row input {
    width: 100%;
    min-width: 0;
    border: 1px solid rgba(255, 255, 255, 0.13);
    border-radius: 18px;
    outline: none;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    padding: 10px 12px;
    font-size: 24px;
    font-weight: 900;
    text-align: right;
    box-shadow: inset 0 1px rgba(255, 255, 255, 0.10);
}

.progress-wrap {
    padding: 0 14px 13px;
}

.bar-track {
    height: 13px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.09);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.10);
}

.bar {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--red), var(--orange));
    transition: width 0.45s ease, background 0.25s ease;
    box-shadow: 0 0 22px currentColor;
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
}

.stat {
    padding: 11px 14px 12px;
    background: rgba(255, 255, 255, 0.045);
}

.stat.right {
    text-align: right;
}

.stat-value {
    margin-top: 4px;
    font-size: clamp(25px, 7vw, 34px);
    font-weight: 950;
    line-height: 1;
}

.toolbar {
    flex: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 var(--page-x) 8px;
}

.toolbar h2 {
    margin: 0;
    font-size: 17px;
    letter-spacing: 0;
}

.counter {
    color: var(--muted);
    font-size: 13px;
    font-weight: 750;
}

.cards {
    display: grid;
    flex: 1;
    min-height: 0;
    align-content: start;
    gap: var(--card-gap);
    padding: 0 var(--page-x);
    overflow: hidden;
}

.card {
    position: relative;
    display: grid;
    grid-template-columns: var(--button-size) minmax(0, 1fr) var(--button-size);
    align-items: center;
    gap: 8px;
    height: var(--card-h);
    min-height: 0;
    padding: 10px;
    border-radius: 18px;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255, 255, 255, 0.10), transparent 42%);
    opacity: 0.8;
    pointer-events: none;
}

.card.excluded {
    opacity: 0.48;
}

.card-center {
    position: relative;
    min-width: 0;
    text-align: center;
}

.card-title {
    overflow: hidden;
    color: #ffffff;
    font-size: var(--card-title);
    font-weight: 950;
    line-height: 1;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.card-meta {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 5px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 750;
}

.dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 14px var(--blue);
}

.card-trips {
    margin-top: 4px;
    font-size: var(--card-trips);
    font-weight: 950;
    line-height: 0.9;
}

.btn {
    position: relative;
    z-index: 1;
    width: var(--button-size);
    height: var(--button-size);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50%;
    color: white;
    font-size: 36px;
    font-weight: 900;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.08);
    box-shadow:
        inset 0 1px rgba(255, 255, 255, 0.20),
        0 12px 26px rgba(0, 0, 0, 0.34);
    transition: transform 0.12s ease, filter 0.18s ease, opacity 0.18s ease;
}

.btn:active {
    transform: scale(0.92);
}

.btn.plus {
    background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.20), transparent 26px),
        linear-gradient(145deg, rgba(52, 211, 153, 0.95), rgba(18, 138, 92, 0.84));
}

.btn.minus {
    background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.18), transparent 26px),
        linear-gradient(145deg, rgba(251, 113, 133, 0.94), rgba(183, 45, 72, 0.82));
}

.btn.disabled {
    opacity: 0.24;
    filter: grayscale(1);
    pointer-events: none;
}

.card-checkbox {
    position: absolute;
    left: 9px;
    top: 8px;
    z-index: 2;
    width: 24px;
    height: 24px;
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
    border-radius: 9px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.10);
    box-shadow: inset 0 1px rgba(255, 255, 255, 0.15), 0 7px 18px rgba(0, 0, 0, 0.32);
}

.card-checkbox:checked {
    background: linear-gradient(135deg, #38bdf8, #2563eb);
}

.card-checkbox:checked::after {
    content: "✓";
    position: absolute;
    left: 5px;
    top: -1px;
    color: white;
    font-size: 18px;
    font-weight: 950;
}

.empty {
    margin: 10px 0 0;
    padding: 30px 22px;
    border: 1px dashed rgba(255, 255, 255, 0.20);
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.045);
    color: var(--muted);
    text-align: center;
    font-size: 15px;
    font-weight: 700;
}

.fab {
    position: fixed;
    left: 50%;
    bottom: calc(var(--safe-bottom) + 2px);
    z-index: 10;
    width: 68px;
    height: 68px;
    transform: translateX(-50%);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 50%;
    background:
        radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.25), transparent 28px),
        linear-gradient(145deg, #38bdf8, #2563eb 62%, #1d4ed8);
    color: white;
    font-size: 44px;
    font-weight: 800;
    line-height: 1;
    box-shadow: 0 18px 46px rgba(37, 99, 235, 0.52);
}

.menu-backdrop {
    position: fixed;
    inset: 0;
    z-index: 11;
    background: rgba(0, 0, 0, 0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
}

.menu-backdrop.open {
    opacity: 1;
    pointer-events: auto;
}

.menu {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 12;
    width: min(430px, 100%);
    margin: 0 auto;
    padding: 16px var(--page-x) calc(18px + var(--safe-bottom));
    border-radius: 28px 28px 0 0;
    border: 1px solid var(--line);
    border-bottom: none;
    background: var(--panel-strong);
    -webkit-backdrop-filter: blur(24px) saturate(1.25);
    backdrop-filter: blur(24px) saturate(1.25);
    box-shadow: 0 -22px 50px rgba(0, 0, 0, 0.42);
    transform: translateY(105%);
    transition: transform 0.32s cubic-bezier(.2, .8, .2, 1);
}

.menu.open {
    transform: translateY(0);
}

.modal {
    position: fixed;
    left: 50%;
    top: 50%;
    z-index: 14;
    width: min(402px, calc(100% - 28px));
    padding: 18px;
    border-radius: 24px;
    background: var(--panel-strong);
    -webkit-backdrop-filter: blur(24px) saturate(1.25);
    backdrop-filter: blur(24px) saturate(1.25);
    border: 1px solid var(--line);
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.54);
    transform: translate(-50%, -46%) scale(0.96);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
}

.modal.open {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
}

.modal h3 {
    margin: 0 0 14px;
    font-size: 21px;
    line-height: 1.15;
}

.field {
    display: grid;
    gap: 8px;
    margin-bottom: 14px;
}

.field input {
    width: 100%;
    min-height: 54px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 17px;
    outline: none;
    background: rgba(255, 255, 255, 0.09);
    color: white;
    padding: 0 15px;
    font-size: 22px;
    font-weight: 850;
    box-shadow: inset 0 1px rgba(255, 255, 255, 0.10);
}

.capacity-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}

.capacity-option {
    min-height: 66px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.08);
    color: white;
    display: grid;
    place-items: center;
    gap: 2px;
    padding: 8px 6px;
}

.capacity-option strong {
    font-size: 20px;
    line-height: 1;
}

.capacity-option span {
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
}

.capacity-option.active {
    border-color: rgba(56, 189, 248, 0.75);
    background: linear-gradient(145deg, rgba(56, 189, 248, 0.34), rgba(37, 99, 235, 0.34));
    box-shadow: 0 0 24px rgba(56, 189, 248, 0.20), inset 0 1px rgba(255, 255, 255, 0.18);
}

.modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.modal-btn {
    min-height: 54px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 17px;
    color: white;
    font-weight: 850;
    font-size: 16px;
}

.modal-btn.primary {
    background: linear-gradient(135deg, #38bdf8, #2563eb);
}

.modal-btn.secondary {
    background: rgba(255, 255, 255, 0.10);
}

.handle {
    width: 44px;
    height: 5px;
    margin: 0 auto 16px;
    border-radius: 99px;
    background: rgba(255, 255, 255, 0.24);
}

.menu-grid {
    display: grid;
    gap: 10px;
}

.action {
    width: 100%;
    min-height: 58px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 18px;
    color: white;
    font-size: 17px;
    font-weight: 850;
    text-align: left;
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.action span:last-child {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.16);
}

.add { background: linear-gradient(135deg, #38bdf8, #2563eb); }
.send { background: linear-gradient(135deg, #34d399, #15803d); }
.reset { background: linear-gradient(135deg, #fb7185, #dc2626); }
.close { background: rgba(255, 255, 255, 0.10); }

@media (max-width: 380px) {
    :root {
        --page-x: 10px;
        --button-size: 50px;
    }

    body {
        padding-top: var(--safe-top);
    }

    .card {
        gap: 8px;
        padding: 9px;
    }

    .btn {
        font-size: 32px;
    }

    .plan-row {
        grid-template-columns: 1fr;
        gap: 10px;
    }

    .plan-row input {
        font-size: 26px;
    }

    .action {
        min-height: 54px;
        font-size: 16px;
    }

    .modal {
        width: calc(100% - 20px);
        padding: 16px;
    }

    .capacity-grid {
        gap: 7px;
    }

    .capacity-option {
        min-height: 62px;
    }
}

@media (min-width: 390px) and (max-width: 430px) {
    .dashboard {
        margin-bottom: 10px;
    }

    .brand-title span,
    .label,
    .counter {
        font-size: 12px;
    }
}

.cards.compact {
    --card-h: 72px;
    --card-title: 24px;
    --card-trips: 34px;
    --card-gap: 7px;
    --button-size: 48px;
}

.cards.compact .card-meta {
    margin-top: 4px;
    font-size: 12px;
}

.cards.ultra {
    --card-h: 58px;
    --card-title: 21px;
    --card-trips: 28px;
    --card-gap: 5px;
    --button-size: 42px;
}

.cards.ultra .card {
    padding: 7px;
    border-radius: 15px;
}

.cards.ultra .card-meta {
    display: none;
}

.cards.ultra .btn {
    font-size: 28px;
}

.cards.ultra .card-checkbox {
    width: 20px;
    height: 20px;
    border-radius: 7px;
}

.cards.ultra .card-checkbox:checked::after {
    left: 4px;
    top: -2px;
    font-size: 15px;
}
</style>
</head>

<body>
<main class="shell">
    <header class="topbar">
        <div class="brand">
            <div class="brand-title">
                <span>Сменный учет</span>
                <strong>БелАЗ</strong>
            </div>
            <div class="status-chip" id="status">0 машин</div>
        </div>
    </header>

    <section class="dashboard glass">
        <div class="plan-row">
            <div class="plan-value">
                <span class="label">План</span>
                <span>Кубатура за смену</span>
            </div>
            <input type="number" id="plan" value="3000" inputmode="decimal" aria-label="План">
        </div>

        <div class="progress-wrap">
            <div class="bar-track"><div class="bar" id="bar"></div></div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="label">Сделано</div>
                <div class="stat-value" id="done">0.0</div>
            </div>
            <div class="stat right">
                <div class="label">Осталось / плюс</div>
                <div class="stat-value" id="left">3000.0</div>
            </div>
        </div>
    </section>

    <div class="toolbar">
        <h2>Машины</h2>
        <div class="counter" id="counter">Нет активных рейсов</div>
    </div>

    <section class="cards" id="cards"></section>
</main>

<button class="fab" id="fab" aria-label="Меню">+</button>
<div class="menu-backdrop" id="menuBackdrop"></div>

<div class="menu" id="menu">
    <div class="handle"></div>
    <div class="menu-grid">
        <button class="action add" onclick="addBelaz()"><span>Добавить БелАЗ</span><span>+</span></button>
        <button class="action send" onclick="sendReport()"><span>Отправить диспетчеру</span><span>↗</span></button>
        <button class="action reset" onclick="resetShift()"><span>Сбросить смену</span><span>×</span></button>
        <button class="action close" onclick="closeMenu()"><span>Закрыть</span><span>⌄</span></button>
    </div>
</div>

<div class="modal" id="addModal" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
    <h3 id="addModalTitle">Новый БелАЗ</h3>
    <label class="field">
        <span class="label">Номер машины</span>
        <input type="text" id="belazNumber" inputmode="numeric" autocomplete="off" placeholder="Например 128">
    </label>
    <div class="field">
        <span class="label">Кубатура</span>
        <div class="capacity-grid" id="capacityGrid">
            <button class="capacity-option active" type="button" data-capacity="37.8"><strong>37.8</strong><span>м³</span></button>
            <button class="capacity-option" type="button" data-capacity="36"><strong>36.0</strong><span>м³</span></button>
            <button class="capacity-option" type="button" data-capacity="22"><strong>22.0</strong><span>м³</span></button>
        </div>
    </div>
    <div class="modal-actions">
        <button class="modal-btn secondary" type="button" onclick="closeAddModal()">Отмена</button>
        <button class="modal-btn primary" type="button" onclick="confirmAddBelaz()">Добавить</button>
    </div>
</div>

<script>
const capacities = [37.8, 36, 22];
let belazList = JSON.parse(localStorage.getItem("belazList") || "[]")
    .map((b, i) => ({ ...b, originalIndex: b.originalIndex ?? i }));

let plan = parseFloat(localStorage.getItem("plan") || "3000");
const planInput = document.getElementById("plan");
const cards = document.getElementById("cards");
const menu = document.getElementById("menu");
const menuBackdrop = document.getElementById("menuBackdrop");
const addModal = document.getElementById("addModal");
const belazNumber = document.getElementById("belazNumber");
const capacityGrid = document.getElementById("capacityGrid");
let selectedCapacity = capacities[0];

planInput.value = plan;

function save() {
    localStorage.setItem("belazList", JSON.stringify(belazList));
    localStorage.setItem("plan", plan);
}

function calc() {
    const active = belazList.filter(b => !b.exclude);
    const total = active.reduce((sum, b) => sum + b.trips * b.capacity, 0);
    const percent = total / plan;
    const over = Math.max(0, total - plan);
    const trips = active.reduce((sum, b) => sum + b.trips, 0);

    document.getElementById("done").textContent = total.toFixed(1);
    document.getElementById("left").textContent = over > 0 ? `+${over.toFixed(1)}` : (plan - total).toFixed(1);
    document.getElementById("left").style.color = over > 0 ? "var(--violet)" : "var(--orange)";
    document.getElementById("counter").textContent = trips ? `${trips} рейсов сегодня` : "Нет активных рейсов";
    document.getElementById("status").textContent = `${active.length} ${machineWord(active.length)}`;

    const bar = document.getElementById("bar");
    bar.style.width = `${Math.min(percent * 100, 100)}%`;
    bar.style.background = percent < 0.7
        ? "linear-gradient(90deg, var(--red), var(--orange))"
        : percent < 1
            ? "linear-gradient(90deg, var(--orange), var(--yellow, #fde047))"
            : "linear-gradient(90deg, var(--green), var(--blue))";
}

function machineWord(count) {
    if (count % 10 === 1 && count % 100 !== 11) return "машина";
    if ([2, 3, 4].includes(count % 10) && ![12, 13, 14].includes(count % 100)) return "машины";
    return "машин";
}

function renderCards() {
    cards.innerHTML = "";
    cards.classList.remove("compact", "ultra");

    if (!belazList.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Нажмите плюс, чтобы добавить первый БелАЗ";
        cards.appendChild(empty);
        adjustCardDensity();
        calc();
        return;
    }

    belazList.forEach((b, i) => {
        const card = document.createElement("article");
        card.className = `card glass${b.exclude ? " excluded" : ""}`;

        const minus = document.createElement("button");
        minus.className = `btn minus${b.exclude ? " disabled" : ""}`;
        minus.type = "button";
        minus.textContent = "−";
        minus.setAttribute("aria-label", "Уменьшить рейсы");
        minus.onclick = () => changeTrip(i, -1);

        const center = document.createElement("div");
        center.className = "card-center";

        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = b.number;

        const meta = document.createElement("div");
        meta.className = "card-meta";
        meta.innerHTML = `<span class="dot"></span><span>${b.capacity} м³</span>`;

        const trips = document.createElement("div");
        trips.className = "card-trips";
        trips.textContent = b.trips;

        center.append(title, meta, trips);

        const plus = document.createElement("button");
        plus.className = `btn plus${b.exclude ? " disabled" : ""}`;
        plus.type = "button";
        plus.textContent = "+";
        plus.setAttribute("aria-label", "Добавить рейс");
        plus.onclick = () => changeTrip(i, 1);

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "card-checkbox";
        checkbox.checked = Boolean(b.exclude);
        checkbox.setAttribute("aria-label", "Исключить машину из расчета");
        checkbox.onchange = () => toggleExclude(i);

        card.append(minus, center, plus, checkbox);
        cards.appendChild(card);
    });

    adjustCardDensity();
    calc();
}

function adjustCardDensity() {
    cards.classList.remove("compact", "ultra");
    cards.style.removeProperty("--card-h");
    cards.style.removeProperty("--button-size");
    cards.style.removeProperty("--card-title");
    cards.style.removeProperty("--card-trips");
    const count = belazList.length;
    if (!count) return;

    const available = cards.clientHeight;
    const normalHeight = 86;
    const compactHeight = 72;
    const normalGap = 8;
    const compactGap = 7;

    if (count * normalHeight + Math.max(0, count - 1) * normalGap <= available) return;

    cards.classList.add("compact");
    if (count * compactHeight + Math.max(0, count - 1) * compactGap <= available) return;

    cards.classList.add("ultra");
    const gap = 5;
    const fittedHeight = Math.floor((available - Math.max(0, count - 1) * gap) / count);
    const rowHeight = Math.max(34, Math.min(58, fittedHeight));
    cards.style.setProperty("--card-h", `${rowHeight}px`);
    cards.style.setProperty("--button-size", `${Math.max(30, rowHeight - 8)}px`);
    cards.style.setProperty("--card-title", `${Math.max(15, Math.min(21, rowHeight * 0.36))}px`);
    cards.style.setProperty("--card-trips", `${Math.max(18, Math.min(28, rowHeight * 0.48))}px`);
}

function changeTrip(i, delta) {
    const next = belazList[i].trips + delta;
    if (next >= 0) {
        belazList[i].trips = next;
        save();
        renderCards();
    }
}

function toggleExclude(i) {
    const item = belazList[i];
    item.exclude = !item.exclude;
    belazList.splice(i, 1);

    if (item.exclude) {
        belazList.push(item);
    } else {
        const pos = belazList.findIndex(e => e.originalIndex > item.originalIndex);
        belazList.splice(pos === -1 ? belazList.length : pos, 0, item);
    }

    save();
    renderCards();
}

function addBelaz() {
    closeMenu();
    selectedCapacity = capacities[0];
    belazNumber.value = "";
    updateCapacityButtons();
    addModal.classList.add("open");
    menuBackdrop.classList.add("open");
    setTimeout(() => belazNumber.focus(), 120);
}

function confirmAddBelaz() {
    const number = belazNumber.value.trim();
    if (!number) {
        belazNumber.focus();
        return;
    }

    belazList.push({
        number,
        capacity: selectedCapacity,
        trips: 0,
        exclude: false,
        originalIndex: belazList.length
    });

    save();
    renderCards();
    closeAddModal();
}

function closeAddModal() {
    addModal.classList.remove("open");
    menuBackdrop.classList.remove("open");
}

function updateCapacityButtons() {
    capacityGrid.querySelectorAll(".capacity-option").forEach(button => {
        button.classList.toggle("active", Number(button.dataset.capacity) === selectedCapacity);
    });
}

function sendReport() {
    const active = belazList.filter(b => !b.exclude && b.trips > 0);
    const text = active.length ? active.map(b => `${b.number} - ${b.trips}`).join("\n") : "-";
    location.href = "https://wa.me/79617080028?text=" + encodeURIComponent(text);
}

function resetShift() {
    if (confirm("Сбросить смену?")) {
        belazList = [];
        plan = 3000;
        localStorage.clear();
        planInput.value = plan;
        renderCards();
        closeMenu();
    }
}

function openMenu() {
    menu.classList.add("open");
    menuBackdrop.classList.add("open");
}

function closeMenu() {
    menu.classList.remove("open");
    if (!addModal.classList.contains("open")) {
        menuBackdrop.classList.remove("open");
    }
}

document.getElementById("fab").onclick = openMenu;
menuBackdrop.onclick = () => {
    closeMenu();
    closeAddModal();
};

capacityGrid.onclick = event => {
    const button = event.target.closest(".capacity-option");
    if (!button) return;
    selectedCapacity = Number(button.dataset.capacity);
    updateCapacityButtons();
};

belazNumber.onkeydown = event => {
    if (event.key === "Enter") confirmAddBelaz();
};

planInput.oninput = event => {
    plan = Math.max(parseFloat(event.target.value) || 3000, 1);
    save();
    calc();
};

window.addEventListener("resize", adjustCardDensity);

renderCards();
</script>
</body>
</html>
